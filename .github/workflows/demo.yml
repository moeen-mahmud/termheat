name: Demo GIF

# Regenerates the README demo whenever the tape changes, so the GIF can never
# show a stale UI. Run manually (workflow_dispatch) after visual releases.
on:
  push:
    branches: [main]
    paths: ["termheat.tape"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # vhs-action downloads ffmpeg from a third-party host and fails often;
      # install the pieces deterministically instead (apt + Charm's apt repo).
      - name: Install VHS
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -fsSL -o /usr/local/bin/ttyd \
            https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64
          sudo chmod +x /usr/local/bin/ttyd
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
            | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs

      - name: Record the demo
        run: vhs termheat.tape

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate demo gif"
          file_pattern: demo.gif
