name: Demo GIF

# Regenerates the README demo whenever the tape changes, so the GIF can never
# show a stale UI. The tape records the real published package via npx, so
# run this (workflow_dispatch) only after a successful npm release.
on:
  push:
    branches: [main]
    paths: ["termheat.tape"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # vhs-action downloads ffmpeg from a third-party host and fails often;
      # install the pieces deterministically instead (apt + Charm's apt repo).
      # noto-color-emoji is needed so 🔥 renders in the recording.
      - name: Install VHS
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-color-emoji
          sudo curl -fsSL -o /usr/local/bin/ttyd \
            https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
          sudo chmod +x /usr/local/bin/ttyd
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
            | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs

      - name: Record the demo
        run: vhs termheat.tape

      # The tape also renders demo.txt — keep it as a debug artifact so a
      # bad recording can be diagnosed without frame-extracting the GIF.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-text-render
          path: demo.txt
          if-no-files-found: ignore

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate demo gif"
          file_pattern: demo.gif
