name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  # For npm Trusted Publishing (OIDC) + provenance once the package exists.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      # changeset publish shells out to npm, which needs Node + the registry.
      # Node 24 ships npm >= 11.5.1, required for Trusted Publishing (OIDC).
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # With pending changesets: opens/updates the "Version Packages" PR.
      # When that PR merges: builds and publishes to npm, then tags.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          title: "chore(release): version package"
          commit: "chore(release): version package"
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node's registry-url makes npm read NODE_AUTH_TOKEN; the
          # changesets action reads NPM_TOKEN. Set both or auth silently
          # goes out empty and npm masks it as E404.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Skip the husky prepare script inside npm publish.
          HUSKY: "0"
